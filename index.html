          ? `<img src="${t.photo}" alt="${esc(t.name)}">`
          : `<span class="trainer-avatar-placeholder">${esc(t.initial)}</span>`}
        ${canEditPhoto(t.name)
          ? `<button class="avatar-edit-btn" onclick="triggerPhotoUpload('${esc(t.name)}')" title="更換大頭照">📷</button>`
          : ''}
      </div>
      <div class="trainer-profile-info">
        <div class="trainer-profile-name">${esc(t.name)} <span style="font-weight:400;font-size:13px;color:#888;letter-spacing:0.03em;">${esc(t.englishName||'')}</span></div>
        <div class="trainer-profile-title">${esc(t.title)}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;">
          ${t.badges.map(b => `<span class="trainer-profile-badge ${b.cls}">${esc(b.label)}</span>`).join('')}
        </div>
      </div>
    </div>`).join('')}
  </div>

  <!-- ── 日期選擇器 ── -->
  <div class="dash-date-bar">
    <span class="dash-date-label">📅 選擇日期</span>
    <input type="date" id="dash-date" class="dash-date-input" value="${dashDate}" onchange="onDashDateChange(this.value)">
    <span class="dash-date-hint">查看該日所在月份及週數的上課統計</span>
  </div>

  <!-- ── 訓練師篩選 ── -->
  <div class="dash-trainer-bar">
    <span class="dash-trainer-label">👤 訓練師</span>
    <div class="dash-trainer-chips">
      <button class="dash-trainer-chip ${dashTrainer==='all'?'active':''}" onclick="setDashTrainer('all')">全部</button>
      ${dataTrainers.map(t => `
        <button class="dash-trainer-chip ${dashTrainer===t?'active':''}" data-trainer="${esc(t)}" onclick="setDashTrainer(this.dataset.trainer)">${esc(t)}</button>
      `).join('')}
    </div>
  </div>

  <!-- ── 時段統計 ── -->
  <div class="dash-section">
    <div class="dash-section-title">時段統計</div>
    <div class="period-big">
      <div class="period-card period-card-clickable" onclick="openLessonBreakdown('month')">
        <div class="period-card-num">${monthTotal}</div>
        <div class="period-card-unit">堂</div>
        <div class="period-card-label">當月總堂數（${ymLabel}）</div>
        <div class="period-card-hint">點擊查看明細</div>
      </div>
      <div class="period-card period-card-clickable" onclick="openLessonBreakdown('week')">
        <div class="period-card-num">${weekTotal}</div>
        <div class="period-card-unit">堂</div>
        <div class="period-card-label">當週總堂數（${weekLabel}）</div>
        <div class="period-card-hint">點擊查看明細</div>
      </div>
    </div>

    <div class="dash-table">
      <div class="dash-table-row dash-table-header">
        <span class="dash-tr-name">訓練師</span>
        <span class="dash-tr-cell">✅ 已完成（月）</span>
        <span class="dash-tr-cell">🗓 請假（月）</span>
        <span class="dash-tr-cell">📚 正在上課（剩餘）</span>
      </div>
      ${(dashTrainer === 'all' ? trainers : trainers.filter(t => t === dashTrainer)).map(t => {
        const tc       = all.filter(c => c.trainer === t);
        const tDone    = allLessons.filter(l => l.trainer === t && l.date.startsWith(ym)).length;
        const tAbsence = tc.reduce((sum, c) => sum + (c.absences||[]).filter(a => a && a.startsWith(ym)).length, 0);
        const tLeft    = tc.filter(c => c.status === '進行中').reduce((sum, c) => sum + (c.classLeft||0), 0);
        return `<div class="dash-table-row">
          <span class="dash-tr-name">${esc(t)}</span>
          <span class="dash-tr-cell accent">${tDone || '—'}</span>
          <span class="dash-tr-cell ${tAbsence>0?'red':''}">${tAbsence || '—'}</span>
          <span class="dash-tr-cell">${tLeft || '—'}</span>
        </div>`;
      }).join('')}
      ${dashTrainer === 'all' ? `
      <div class="dash-table-row" style="background:var(--bg);">
        <span class="dash-tr-name" style="font-size:11px;color:var(--muted);">合計</span>
        <span class="dash-tr-cell accent" style="font-weight:800;">${monthTotal}</span>
        <span class="dash-tr-cell red" style="font-weight:800;">
          ${all.reduce((s,c)=>s+(c.absences||[]).filter(a=>a&&a.startsWith(ym)).length,0)||'—'}
        </span>
        <span class="dash-tr-cell" style="font-weight:800;">
          ${all.filter(c=>c.status==='進行中').reduce((s,c)=>s+(c.classLeft||0),0)||'—'}
        </span>
      </div>` : ''}
    </div>
  </div>

  <!-- ── 訓練師圓餅圖 ── -->
  <div class="dash-section">
    <div class="dash-section-title">訓練師 · 當月課程類型分布（${ymLabel}）</div>
    <div class="trainer-pie-row">
      ${(dashTrainer === 'all' ? TRAINERS_INFO : TRAINERS_INFO.filter(ti => dashTrainer.includes(ti.name))).map(ti => {
        const t = ti.name;
        // Count lessons by plan type for this trainer this month
        const counts = Object.fromEntries(PLAN_ORDER.map(k => [k, 0]));
        allLessons.filter(l => l.trainer === t && l.date.startsWith(ym)).forEach(l => {
          const client = all.find(c => c.dog === l.dog && c.trainer === t);
          const key = getPlanKey(client?.plan || '');
          counts[key] = (counts[key] || 0) + 1;
        });
        const total = Object.values(counts).reduce((s,n) => s+n, 0);

        // Fallback: count clients by plan if no lessons this month
        const fallback = !total;
        const displayCounts = { ...counts };
        if (fallback) {
          all.filter(c => c.trainer === t).forEach(c => {
            const key = getPlanKey(c.plan || '');
            displayCounts[key] = (displayCounts[key] || 0) + 1;
          });
        }

        const slices = PLAN_ORDER.map(k => ({ label: k, count: displayCounts[k]||0, color: PLAN_COLORS[k] }));
        const displayTotal = Object.values(displayCounts).reduce((s,n) => s+n, 0);
        const svg = makePieSVG(slices);

        return `<div class="trainer-pie-card">
          <div class="trainer-pie-name">${esc(t)}</div>
          ${svg ? `
          <div class="trainer-pie-body">
            ${svg}
            <div class="pie-legend">
              ${slices.filter(s => s.count > 0).map(s => `
                <div class="pie-legend-item">
                  <span class="pie-dot" style="background:${s.color}"></span>
                  <span class="pie-legend-label">${s.label}</span>
                  <span class="pie-legend-count" style="color:${s.color}">${s.count}</span>
                </div>`).join('')}
            </div>
          </div>
          <div class="pie-total">${fallback ? (displayTotal > 0 ? '客戶分布（本月無紀錄）' : '尚無客戶資料') : `本月共 ${total} 堂`}</div>
          ` : `<div class="no-pie-data">尚無客戶資料</div>`}
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- ── 概覽 ── -->
  <div class="dash-section">
    <div class="dash-section-title">整體概覽</div>
    <div class="dash-grid-4">
      <div class="dash-stat-card">
        <div class="dash-stat-icon">🐾</div>
        <div class="dash-stat-num" style="color:var(--accent)">${active}</div>
        <div class="dash-stat-label">進行中</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-icon">⚠️</div>
        <div class="dash-stat-num" style="color:${urgent>0?'var(--red)':'var(--muted)'}">${urgent}</div>
        <div class="dash-stat-label">需跟進（≤2堂）</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-icon">⏸</div>
        <div class="dash-stat-num" style="color:var(--gray)">${paused}</div>
        <div class="dash-stat-label">暫停</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-icon">👥</div>
        <div class="dash-stat-num">${all.length}</div>
        <div class="dash-stat-label">全部客戶</div>
      </div>
    </div>
  </div>

  <!-- ── 方案 & 狀態 ── -->
  <div class="dash-grid-2">
    <div class="dash-section">
      <div class="dash-section-title">方案分布</div>
      <div class="dash-table">
        ${[...plans.map(([k,c,bg]) => [k+'方案', planCount(k), c, bg]),
           ['其他', planOther, '#888', '#f3f4f6']
          ].filter(([,n]) => n > 0).map(([name, n, color, bg]) => {
            const pct = all.length > 0 ? Math.round(n/all.length*100) : 0;
            return `<div class="dash-table-row">
              <span style="flex:1;font-weight:700;font-size:13px;color:${color}">${name}</span>
              <div style="flex:2;height:12px;background:var(--bg);border-radius:4px;overflow:hidden;margin:0 10px;">
                <div style="width:${pct}%;height:100%;background:${bg};border-right:2px solid ${color};border-radius:4px;"></div>
              </div>
              <span style="font-size:12px;color:var(--muted);min-width:58px;text-align:right;">${n} 位 ${pct}%</span>
            </div>`;
          }).join('')}
      </div>
    </div>
    <div class="dash-section">
      <div class="dash-section-title">狀態分布</div>
      <div class="dash-table">
        ${[
          ['🔴 緊急 ≤2堂', urgent, 'var(--red)'],
          ['🟡 注意 3–4堂', warning, 'var(--yellow)'],
          ['🟢 正常 ≥5堂', Math.max(0, active-urgent-warning), 'var(--accent)'],
          ['⏸ 暫停', paused, 'var(--gray)'],
          ['☑ 已結課', done, '#bbb'],
        ].map(([label, n, color]) => `
          <div class="dash-table-row">
            <span style="flex:1;font-size:12px;">${label}</span>
            <span style="font-weight:800;font-size:18px;color:${color};min-width:32px;text-align:right;">${n}</span>
          </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- ── 最近上課紀錄 ── -->
  <div class="dash-section">
    <div class="dash-section-title">最近上課紀錄${dashTrainer !== 'all' ? `（${esc(dashTrainer)}）` : ''}</div>
    <div class="recent-lesson-list">
      ${viewLessons.slice(0,10).map(l => `
        <div class="recent-lesson-item">
          <span class="rl-date">${esc(l.date)}${l.time?' '+esc(l.time):''}</span>
          <span class="rl-dog">${esc(l.dog)}</span>
          <span class="rl-trainer">${esc(l.trainer)}</span>
          <span class="lesson-type-badge ${l.type==='代訓'?'lt-train':'lt-class'}">${esc(l.type||'上課')}</span>
        </div>`).join('')}
      ${viewLessons.length===0
        ? '<div style="color:var(--muted);font-size:12px;padding:8px;font-style:italic;">尚無上課紀錄</div>'
        : ''}
    </div>
  </div>`;
}
</script>

<!-- Lesson breakdown modal -->
<div class="breakdown-modal-overlay" id="breakdown-modal" onclick="closeLessonBreakdown(event)">
  <div class="breakdown-modal">
    <div class="breakdown-modal-title" id="breakdown-modal-title"></div>
    <div class="breakdown-modal-sub" id="breakdown-modal-sub"></div>
    <div id="breakdown-modal-body"></div>
    <button class="act-btn" style="margin-top:18px;width:100%;" onclick="document.getElementById('breakdown-modal').classList.remove('open')">關閉</button>
  </div>
</div>

<!-- Hidden photo upload input -->
<input type="file" id="photo-upload-input" accept="image/*" style="display:none" onchange="handlePhotoUpload()">

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-logo">Z</div>
    <div class="login-title">ZenPet 堂數追蹤</div>
    <div class="login-sub">請輸入您的 Gmail 信箱登入</div>
    <input class="login-input" id="login-email" type="email" placeholder="your@gmail.com"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">登入</button>
  </div>
</div>
</body>
</html>
